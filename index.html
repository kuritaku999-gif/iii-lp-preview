<style>
  :root{--paper:#efe9df;--paper2:#e7e0d2;--ink:#181712;--accent:#6b6357;--line:#cfc7b8;--max:1080px}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:"Times New Roman","Noto Serif JP","Yu Mincho",serif;color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased}
  img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
  .top{display:flex;align-items:baseline;gap:.6rem;padding:1rem clamp(1rem,4vw,2.5rem);border-bottom:1px solid var(--line)}
  .top .mark{font-size:1.4rem;font-weight:700;letter-spacing:.13em}.top .sub{font-size:.58rem;letter-spacing:.26em;text-transform:uppercase;color:var(--accent)}
  .lead{max-width:var(--max);margin:0 auto;padding:2.6rem clamp(1rem,4vw,2.5rem) 1rem}
  .lead h1{font-size:clamp(2.4rem,8vw,4.5rem);font-weight:400;letter-spacing:.03em;margin:0 0 .4rem}
  .lead p{color:var(--accent);margin:0}
  .cards{max-width:var(--max);margin:0 auto;padding:1.5rem clamp(1rem,4vw,2.5rem) 4rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.6rem}
  .card{border:1px solid var(--line);background:#fff;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
  .card:hover{box-shadow:0 10px 34px rgba(0,0,0,.13);transform:translateY(-3px)}
  .card .thumb{height:210px;background:var(--paper2) center top/cover no-repeat;border-bottom:1px solid var(--line)}
  .card .body{padding:1.1rem 1.3rem 1.4rem}
  .card .no{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--accent)}
  .card h3{margin:.3rem 0 .35rem;font-size:1.2rem;font-weight:400}
  .card .d{font-size:.82rem;color:var(--accent)}
  .card .go{display:inline-block;margin-top:.9rem;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;border-bottom:1px solid var(--ink);padding-bottom:2px}
  footer{border-top:1px solid var(--line);padding:1.6rem;text-align:center;font-size:.64rem;color:var(--accent);letter-spacing:.08em}
</style>
